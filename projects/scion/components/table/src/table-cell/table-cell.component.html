@let _cell = cell();
<div class="cell" #cellElement>
  @switch (_cell.type) {
    @case ('template') {
      <ng-template *ngTemplateOutlet="_cell.template().template; context: templateContext()" />
    }
    @case ('component') {
      <ng-container #componentOutlet></ng-container>
    }
    @case ('boolean') {
      @let value = _cell.value();
      <span class="checkbox material-symbols-outlined" [attr.data-checked]="value">
        @if (value) {
          check_box
        } @else {
          check_box_outline_blank
        }
      </span>
    }
    @default {
      {{_cell.value()}}
    }
  }
</div>
