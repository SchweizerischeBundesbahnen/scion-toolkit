@let _cell = cell();
<div class="cell" [ngClass]="{'checkbox material-symbols-outlined': _cell.type === 'boolean'}" #cellElement>
  @switch (_cell.type) {
    @case ('template') {
      <ng-template *ngTemplateOutlet="_cell.template().template; context: templateContext()" />
    }
    @case ('component') {
      <ng-container #componentOutlet></ng-container>
    }
    @case ('boolean') {
      @let value = _cell.value();
      @if (value) {
        check
      }
    }
    @default {
      {{_cell.value()}}
    }
  }
</div>
