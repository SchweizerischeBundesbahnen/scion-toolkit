@let _cell = cell();
<div class="wrapper">
  @switch (_cell.type) {
    @case ('template') {
      <ng-template *ngTemplateOutlet="_cell.template().template; context: templateContext()" />
    }
    @case ('component') {
      <ng-container *ngComponentOutlet="_cell.component.component; inputs: _cell.component.inputs" />
    }
    @default {
      {{_cell.label()}}
    }
  }
</div>
