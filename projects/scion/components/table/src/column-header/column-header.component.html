<div class="header">
  <button class="column-sort"
          [attr.data-filterable]="column().filterable()"
          [attr.data-sortable]="column().sortable()"
          [attr.data-sort]="columnSort()"
          (click)="onSort($event)">
    {{ column().header() }}
  </button>
  @if (column().filterable()) {
    <sci-column-filter [column]="column()" (filter)="filter.emit($event)" />
  }
</div>
@if (column().resizable()) {
  <sci-splitter orientation="vertical"
                (start)="onResizeStart()"
                (move)="onResize($event)"
                (end)="onResizeEnd()"
                (reset)="onResizeAuto()" />
} @else {
  <div class="delimiter"></div>
}
