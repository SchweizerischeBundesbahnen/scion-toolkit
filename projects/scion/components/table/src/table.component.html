@let table = sciTable();
<div class="table-wrapper" sciScrollable #hViewport>
  <div class="table-header">
    @for (col of table.columns(); track $index) {
      <div class="column-header" #header>
        <button class="column-sort"
                [attr.data-sortable]="table.isSortable() && col.sortable()"
                [attr.data-sort]="sort()[0]?.columnName === col.name && sort()[0]?.direction"
                (click)="onSort(col)">
          {{ col.header() }}
        </button>
        @if (table.isResizable() && col.resizable()) {
          <sci-splitter orientation="vertical"
                        (start)="onResizeStart(col, header)"
                        (move)="onResize(col, $event)"
                        (end)="onResizeEnd()"
                        (reset)="onResizeAuto(col)" />
        } @else {
          <div class="delimiter"></div>
        }
      </div>
    }
  </div>
  <div class="table-body">
    <cdk-virtual-scroll-viewport itemSize="26" sciScrollable #cdkViewport>
      <sci-table-row
        *cdkVirtualFor="let row of placeholderItems(); let i = index; trackBy: trackBy.bind(this)"
        [row]="cachedItems().get(i)"
        [index]="i"
        [selectedRows]="selectedRowIndices()"
        [activeRow]="activeRow()?.index"
        (activateRow)="onActivateRow(row.item, i)"
        (selectRow)="onSelectRow(row.item, i, $event)"
      />
    </cdk-virtual-scroll-viewport>
  </div>
</div>

<sci-scrollbar [direction]="'vscroll'" [viewport]="cdkViewport.getElementRef().nativeElement"/>
<sci-scrollbar [direction]="'hscroll'" [viewport]="hViewport"/>
