@let table = sciTable();
<div class="h-scroll" sciScrollable #hViewport>
  <div class="table-wrapper">
    <div class="table-header">
      @for (column of columns(); track $index) {
        <sci-column-header [column]="column"
                           [sorts]="sort()"
                           [isResizable]="table.resizable"
                           [isSortable]="table.sortable"
                           (autoResize)="onResizeAuto(column)"
                           (sort)="onSort(column, $event)" />
      }
    </div>
    <div class="table-filter">
      @if (table.filterable) {
        @for (column of columns(); track $index) {
          <sci-column-filter [column]="column" (filter)="onFilter(column, $event)" />
        }
      }
    </div>
    <div class="table-body">
      <cdk-virtual-scroll-viewport itemSize="26" sciScrollable #cdkViewport>
        <sci-table-row *cdkVirtualFor="let item of placeholderItems(); let i = index; trackBy: trackBy.bind(this)"
                       [row]="cachedItems() | sciMapGet:i"
                       [index]="i"
                       [selectedRows]="selectedRowIndices()"
                       [activeRow]="activeRow()?.index"
                       (activateRow)="onActivateRow(item, i)"
                       (selectRow)="onSelectRow(item, i, $event)" />
      </cdk-virtual-scroll-viewport>
    </div>
    <sci-scrollbar [direction]="'vscroll'" [viewport]="cdkViewport.getElementRef().nativeElement"/>
  </div>
  <sci-scrollbar [direction]="'hscroll'" [viewport]="hViewport"/>
</div>
