@let table = sciTable();
<cdk-virtual-scroll-viewport [itemSize]="table.itemSize" sciScrollable #cdkViewport>
  <div class="table-header">
    @for (column of columns(); track $index) {
      <sci-column-header [column]="column"
                         [sorts]="sort()"
                         (autoResize)="onResizeAuto(column)"
                         (sort)="onSort(column, $event)"
                         (filter)="onFilter(column, $event)" />
    }
  </div>
  <ng-container *cdkVirtualFor="let _ of placeholderItems(); let i = index; trackBy: trackBy.bind(this)" >
    @if (cachedItems() | sciMapGet:i; as row) {
      <sci-table-row [row]="row"
                     [table]="table"
                     [selectedItems]="selectedItems()"
                     [activeItem]="activeItem()"
                     (activateItem)="onActivateRow(row.item)"
                     (selectItem)="onSelectRow(row.item, $event)" />
    }
  </ng-container>
</cdk-virtual-scroll-viewport>
<sci-scrollbar [direction]="'vscroll'" [viewport]="cdkViewport.getElementRef().nativeElement"/>
<sci-scrollbar [direction]="'hscroll'" [viewport]="cdkViewport.getElementRef().nativeElement"/>
