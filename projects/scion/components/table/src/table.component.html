<div class="viewport e2e-viewport" #viewport sciScrollable>
  <div class="grid">
    @if (sciTable().headerVisible()) {
      <header #header>
        @for (column of columns(); track column.name) {
          <sci-column-header [column]="column"
                             [table]="sciTable()"
                             (autoResize)="onResizeAuto(column)"
                             (widthChange)="onResize(column, $event)" />
        }
      </header>
    }
    <div class="rows">
      <!-- Track index to reuse the table row elements -->
      @for (row of visibleRows(); track $index) {
        <sci-table-row [row]="row"
                       [table]="sciTable()"
                       [activeItem]="activeItem()"
                       [selectedItems]="selectedItems()"
                       [style.transform]="`translateY(${scrollStart() + (sciTable().itemSize * $index)}px)`"
                       (activateItem)="onActivateRow(row.item!)"
                       (selectItem)="onSelectRow(row.item!, $event)" />
      } @empty {
        <div class="empty-state">Nothing to show.</div>
      }
    </div>
  </div>
</div>
<sci-scrollbar [direction]="'vscroll'" [viewport]="viewport" class="vscroll" />
<sci-scrollbar [direction]="'hscroll'" [viewport]="viewport"/>
