@let table = sciTable();
<cdk-virtual-scroll-viewport [itemSize]="table.itemSize" sciScrollable #cdkViewport>
  @if (table.headerVisible()) {
    <header>
      @for (column of columns(); track $index) {
        <sci-column-header [column]="column"
                           [table]="table"
                           (autoResize)="onResizeAuto(column)"
                           (widthChange)="onResize(column, $event)"
                           (sort)="onSort(column, $event)"
                           (filter)="onFilter(column, $event)" />
      }
    </header>
  }
  @if (!rows().length) {
    <div class="empty-state">Nothing to show</div>
  }
  <ng-container *cdkVirtualFor="let row of rows(); trackBy: trackBy" >
    <sci-table-row [row]="row"
                   [table]="table"
                   [selectedItems]="selectedItems()"
                   [activeItem]="activeItem()"
                   (activateItem)="onActivateRow(row.item)"
                   (selectItem)="onSelectRow(row.item, $event)" />
  </ng-container>
</cdk-virtual-scroll-viewport>
<sci-scrollbar [direction]="'vscroll'" 
               [viewport]="cdkViewport.getElementRef().nativeElement" 
               [class.vscroll-filter]="table.filterable() && table.headerVisible()" 
               [class.vscroll-no-filter]="!table.filterable() && table.headerVisible()" />
<sci-scrollbar [direction]="'hscroll'" [viewport]="cdkViewport.getElementRef().nativeElement"/>
