<header>
  <span class="title">{{activatedFeature()?.name}}</span>
  <sci-menubar name="menubar:main"/>
  <sci-toolbar name="toolbar:settings"/>
</header>

<main>
  <router-outlet (activate)="onRouteActivate()"/>

  @if (!activatedFeature()) {
    <span class="welcome-message">
      Welcome to SCION Components.
      <p>
      Please select a component from the menu.
    </span>
  }
</main>
