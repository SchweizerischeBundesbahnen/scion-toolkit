<main>
  <sci-table [table]="settings().slowDataSource ? slowTable() : table()" (activateItem)="onActivateRow($event)" (selectItems)="onSelectRows($event)" />
</main>

<aside class="e2e-settings">
  <form>
    <label>
      <input [formField]="form.filterable" type="checkbox" />
      Filterable
    </label>

    <label>
      <input [formField]="form.sortable" type="checkbox" />
      Sortable
    </label>

    <label>
      <input [formField]="form.resizable" type="checkbox" />
      Resizable
    </label>

    <label>
      <input [formField]="form.showHeader" type="checkbox" />
      Show Header
    </label>

    <select [formField]="form.language">
      <option value="de">DE</option>
      <option value="fr">FR</option>
    </select>

    <button (click)="onUpdateSignal()">Update local state</button>

    <label>
      <input [formField]="form.slowDataSource" type="checkbox" />
      Use Slow DataSource
    </label>
  </form>

  <dl>
    <dt>Active Code:</dt>
    <dd>{{activeItem() ?? '-'}}</dd>

    <dt>Selected Codes:</dt>
    <dd>{{selectedItems() ?? '-'}}</dd>
  </dl>
</aside>
