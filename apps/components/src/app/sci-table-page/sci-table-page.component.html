<main>
  <button (click)="onUpdateSignal()">Update Signal</button>
  <select [(ngModel)]="language">
    <option value="de">DE</option>
    <option value="fr">FR</option>
  </select>
  <sci-table [table]="table" (activateRow)="activeRow.set($event)" (selectRows)="onSelectRows($event)" />
  <ng-template let-station let-custom="custom" #cell>
    {{station.sloid}} / {{custom}}
  </ng-template>
</main>

<aside class="e2e-settings">
  <dl>
    <dt>Active Row Index:</dt>
    <dd>{{activeRow()?.index ?? '-'}}</dd>

    <dt>Active Sloid:</dt>
    <dd>{{ activeRow()?.row?.sloid ?? '-' }}</dd>

    <dt>Selected Row Indices:</dt>
    <dd>{{selectedRows() ?? '-'}}</dd>
  </dl>
</aside>
